name: Unsnooze
on:
  schedule:
    - cron: '0 14 * * *'  # 7:00 AM MST (UTC-7, no DST)
  workflow_dispatch: {}    # Manual trigger for testing

jobs:
  unsnooze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci && node src/unsnooze-cron.js
        env:
          GITHUB_TOKEN: ${{ secrets.SNOOZE_PAT }}
          TIMEZONE: America/Phoenix
